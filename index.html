
<!DOCTYPE html>
<html>
    <head>
        <style>

            @keyframes bgMove {
                0% {background-color: #121212}
                25% {background-color: #424242}
                50% {background-color: #0a0a0a}
                100% {background-color: #363636}
            }
            .body {
                /* background: linear-gradient(-90deg, #3b3b3b, #0a0a0a, #bdbdbd); */
                align-items: center;
                animation: bgMove 8s ease infinite;
                justify-items: center;
            }


            .mainbox {
                padding-left: 30px;
                display: flex;
                align-items: top;
                position: relative;
                padding: 20px;
                margin-right: 20px;
                gap: 20px;
                margin: 0 auto;
                text-align: center;
                width: 100%;
                justify-content: center;
                justify-items: center;
            }
            .mypfp {
                gap: 20px;
                width: 90px;
                height: 90px;
                border-radius: 50%;
            }

            @keyframes colorShift {
                0% {color: red;}
                25% {color: blue;}
                50% {color: purple;}
                75% {color: aqua;}
                100% {color: red;}
            }

            .usernamelabel {
                font-size: 30px;
                margin-top: 20px;
                margin-right: 20px;
                animation: colorShift 4s linear infinite;
            }

            .usernamediv {
                /* useless div but keep it here */
                align-items: center;
            }

            .testdiv {
                border-radius: 10px;
                border: 3px solid black;
                /* background-color: rgba(139, 139, 140, 0.3); */
                padding-left: 30px;
                display: flex;
                align-items: top;
                position: relative;
                animation: moveup 1s ease;
                padding: 20px;
                /* padding-left: 100px; */
                /* padding-right: 100px; */
                width: 95%;
                height: 90%;
                gap: 20px;
                flex-direction: column;
                position: absolute;
            }


            .biodiv {
                color: white;
                border: 3px solid black;
                background-color: rgba(20, 20, 20, 0.6);
                backdrop-filter: blur(8px);
                box-shadow:
                    5px 5px 20px rgba(255, 255, 255, 0.2),
                    10px 10px 20px rgba(0, 0, 0, 0.8);
                border-radius: 10px;
                width: 40%;
                display: inline-block;
                white-space: nowrap;
                animation: moveup 1s ease;
                margin: 0 auto;
                text-align: center;
            }

            .biop {
                color: white;
                font-size: 20px;
                margin-left: 15px;
                animation: moveup 0.8s ease;
                margin: 0 auto;
            }

            .socialsspan {
                margin-top: 20px;
            }

            @keyframes moveup {
                0% {margin-top: 100px};
                100% {margin-top: 0px;}
            }

            .socialsdiv {
                height: auto;
                align-items: center;
                border: 3px solid #181818;
                width: 50%;
                background-color: rgba(20, 20, 20, 0.6);
                backdrop-filter: blur(8px);
                box-shadow:
                    5px 5px 20px rgba(255, 255, 255, 0.2),
                    10px 10px 20px rgba(0, 0, 0, 0.8);
                height: 100px;
                justify-content: center;
                margin: 0 auto;
                animation: moveup 1s ease;
                justify-items: center;
                text-align: center;
            }

            .social_btn {
                background-color: rgba(20, 20, 20, 0.6);
                backdrop-filter: blur(8px);
                box-shadow:
                    5px 5px 20px rgba(255, 255, 255, 0.2),
                    10px 10px 20px rgba(0, 0, 0, 0.8);
                width: 70px;
                margin-top: 20px;
                transition: margin-bottom 0.3s ease;
                height: 60px;
                margin-bottom: 0px;
            }
            @keyframes socialbtn_border {
                0% {
                    background-color: white;
                    margin-top: 0px;
                }
                100% {
                    background-color: red;
                    margin-top: 20px;
                }
            }

            .social_btn:hover {
                border-radius: 10px;
                margin-bottom: 30px;
            }

            .social_img {
                width: 55px;
                height: 55px;
            }

            .song_playerdiv {
                color: white;
                align-items: center;
                background-color: rgba(20, 20, 20, 0.6);
                backdrop-filter: blur(8px);
                box-shadow:
                    5px 5px 20px rgba(255, 255, 255, 0.2),
                    10px 10px 20px rgba(0, 0, 0, 0.8);

                border: 3px solid black;
                margin-left: 50px;
                border-radius:5px;
                width: 15%;
            }

            .song_player_btns {
                align-items: center;
                border: 3px solid black;
                border-radius: 5px;
            }

            .song_player_btn {
                background-color: #3b3b3b;
                color: white;
                border-radius: 10px;
                font-size: 20px;
            }

            .left {
                position: absolute;
                left: 10px;
                top: 10px;
                margin: 0;
            }

            .move_up {
                animation: moveup 1s ease;
            }

            .gayshit {
                transition: margin-bottom 0.5s ease;
            }
            .gayshit:hover {
                margin-bottom: 20px;
            }
            select {
                background-color: #181818;
                animation: moveup 1s ease;
                font-size: 20px;
                color: white;
            }

            option {
                font-size: 15px;
                color: white;
                background-color: #323232;
            }

            .projects_div {
                border: 3px solid black;
                border-radius: 10px;
                left: 0;
                padding: 10px;
                background-color: rgba(20, 20, 20, 0.6);
                backdrop-filter: blur(8px);
                box-shadow:
                    0 0 10px rgba(255, 255, 255, 0.2),
                    0 0 30px rgba(0, 0, 0, 0.8);
                position: absolute;
                height: 100px;
                width: fit-content; /* Allow it to take up only as much space as it needs */
                min-width: 250px; /* Ensure it has a reasonable minimum width */
            }

            @keyframes Twitch {
                0% {margin-left: 10px}
                20% {margin-left: -20px}
                40% {margin-left: -10px}
                80% {margin-left: 5px}
                90% {margin-left: -5px}

            }
            .twitch {

            }

            .twitch:hover {
                animation: Twitch 0.8s linear;
            }
        </style>
        <title>dhza's stupid ebio</title>
    </head>
    <body class="body">
        <script src="script.js"></script>
        <div class="testdiv">
            <div class="mainbox">
                <div class="projects_div twitch">
                    <label for="Projects" class="left biop move_up">My Projects:</label>
                    <select id="Projects" class="left" style="margin-top: 30px" onchange="handleSelection(this)">
                        <option value="default">Select a project</option>
                        <option value="dobfuscator">python obfuscator</option>
                        <option value="archpkgmgr">arch linux pkg mgr</option>
                    </select>
                </div>
                <img src="static/pfp.png" class="mypfp"></img>
                <span class="usernamelabel">dhza</span>
                <div class="song_playerdiv">
                    <p id="songName" style="margin-left: 20px;">SONG NAME</p>
                    <div class="song_player_btns">
                        <button class="song_player_btn" onclick="back_button()">⏮️</button>
                        <button class="song_player_btn" onclick="play_button()" id="pausebtn">▶️</button>
                        <button class="song_player_btn" onclick="next_song()">⏭️</button>
                    </div>
                </div>
            </div>
            <div class="biodiv">
                <p class="biop">C++ and Python developer</p>
                <p class="biop">reverse engineering enthusiast</p>
                <p class="biop">(maybe) updated local ip: 192.168.0.11</p>
            </div>
            <span class="biop socialsspan">my socials: </span>
            <div class="socialsdiv">
                <button onclick="redirect_discord()" class="social_btn"><img src="static/discord_removebg.png" class="social_img"></img></button>
                <button onclick="redirect_github()" class="social_btn"><img src="static/github.png" class="social_img"></img></button>
            </div>
        </div>

    </body>
</html>
